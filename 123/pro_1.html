<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Automation Service Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f172a; /* ডার্ক ব্যাকগ্রাউন্ড */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* গ্লোয়িং ইফেক্টসহ মেইন কার্ড */
        .automation-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            width: 380px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 30px rgba(99, 102, 241, 0.1);
            position: relative;
            transition: all 0.4s ease;
        }

        .automation-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(99, 102, 241, 0.3);
        }

        /* এআই অ্যানিমেশন আইকন এরিয়া */
        .ai-icon-box {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        /* একটি সাধারণ গ্লোয়িং সার্কেল আইকন */
        .ai-icon-box::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 4px solid #fff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        .role {
            font-size: 13px;
            color: #818cf8;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .headline {
            font-size: 26px;
            color: #f8fafc;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .description {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* দক্ষতা বা ট্যাগগুলো */
        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(99, 102, 241, 0.1);
            color: #c084fc;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        /* অ্যাকশন বাটন */
        .cta-btn {
            display: block;
            text-decoration: none;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #ffffff;
            padding: 12px 0;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: opacity 0.3s ease;
        }

        .cta-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="automation-card">
        <div class="ai-icon-box"></div>
        
        <p class="role">AI Automation Specialist</p>
        <h2 class="headline">ভবিষ্যতকে করুন অটোমেটেড</h2>
        
        <p class="description">
            আমি কৃত্রিম বুদ্ধিমত্তা (AI) এবং কাস্টম ওয়ার্কফ্লো ব্যবহার করে ব্যবসার জটিল ও পুনরাবৃত্তিমূলক কাজগুলোকে স্বয়ংক্রিয় করে তুলি। উৎপাদনশীলতা বাড়াতে আজই আপনার সিস্টেম অটোমেট করুন।
        </p>

        <div class="tags">
            <span class="tag">Zapier / Make</span>
            <span class="tag">LLM Integration</span>
            <span class="tag">AI Chatbots</span>
        </div>
        
        <a href="#" class="cta-btn">অটোমেশন শুরু করুন</a>
    </div>

</body>
</html>
